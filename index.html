<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윤에듀케이션 주식 포트폴리오</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg-navy: #0b132b;
            --text-light: #f8f9fa;
            --gold-primary: #d4af37;
            --gold-secondary: #f3e5ab;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-navy);
            background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(28, 49, 94, 0.5), transparent 40%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--gold-primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .filter-container select {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .filter-container select option {
            background: var(--bg-navy);
            color: var(--text-light);
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Summary Section */
        .summary-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .summary-box h2 {
            font-size: 1.2rem;
            color: var(--gold-secondary);
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 0.5rem;
        }

        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            text-align: center;
        }

        .price-item h3 {
            font-size: 0.85rem;
            color: #a0a0b0;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }

        .price-item p {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
        }

        /* Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            flex: 1;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        /* Table Container */
        .table-container {
            overflow-x: auto;
            max-height: 460px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--card-border);
        }

        th {
            color: var(--gold-primary);
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .positive { color: #00e676; }
        .negative { color: #ff1744; }

        /* Scrollbar styles */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); border-radius: 4px; }

        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>윤에듀케이션 주식 포트폴리오</h1>
        <div class="filter-container">
            <select id="stockFilter" onchange="filterData()">
                <option value="all">데이터 불러오는 중...</option>
            </select>
        </div>
    </header>

    <div class="summary-container" id="summaryCards">
        </div>

    <div class="dashboard-grid">
        <div class="glass-card">
            <h3 style="margin-bottom: 1rem; color: var(--gold-secondary);">주가 추이 비교</h3>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
        
        <div class="glass-card table-container">
            <h3 style="margin-bottom: 1rem; color: var(--gold-secondary);">기간별 수익률</h3>
            <table>
                <thead>
                    <tr>
                        <th>종목명</th>
                        <th>1개월</th>
                        <th>3개월</th>
                        <th>6개월</th>
                    </tr>
                </thead>
                <tbody id="returnTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <footer>
        © [윤에듀케이션]. All Rights Reserved.
    </footer>

    <script>
        // 사용자가 제공한 원본 구글 시트 URL
        const pubhtmlUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBj6JRux8kWW77YrxMFlNojH_oBEqjY7XgEcZkWsuWGgydF4W4BAf2dpMw7IwyWE3d6wZ3mNmiMwAe/pubhtml";
        const csvBaseUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBj6JRux8kWW77YrxMFlNojH_oBEqjY7XgEcZkWsuWGgydF4W4BAf2dpMw7IwyWE3d6wZ3mNmiMwAe/pub";

        let chartInstance = null;
        let globalData = [];

        // 차트 렌더링을 위한 다이내믹 색상 팔레트 (골드, 블루, 퍼플, 등)
        const colorPalette = [
            { border: '#d4af37', bg: 'rgba(212, 175, 55, 0.1)' }, // Gold
            { border: '#4facfe', bg: 'rgba(79, 172, 254, 0.1)' }, // Blue
            { border: '#8E2DE2', bg: 'rgba(142, 45, 226, 0.1)' }, // Purple
            { border: '#00e676', bg: 'rgba(0, 230, 118, 0.1)' },  // Light Green
            { border: '#ff7eb3', bg: 'rgba(255, 126, 179, 0.1)' }, // Pink
            { border: '#ff9a44', bg: 'rgba(255, 154, 68, 0.1)' }   // Orange
        ];

        async function loadData() {
            try {
                // 1. CORS 프록시를 통해 pubhtml HTML 소스를 가져와서 시트 목록(이름 및 gid)을 파싱합니다.
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(pubhtmlUrl + "?t=" + Date.now())}`;
                const response = await fetch(proxyUrl);
                const htmlText = await response.text();

                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, "text/html");
                const sheetItems = doc.querySelectorAll('li[id^="sheet-button-"]');

                const sheets = [];
                sheetItems.forEach(item => {
                    const gid = item.id.replace('sheet-button-', '');
                    const name = item.innerText.trim();
                    sheets.push({ gid, name });
                });

                if (sheets.length === 0) {
                    throw new Error("시트 정보를 찾을 수 없습니다.");
                }

                // 2. 추출한 각각의 시트(gid)에 대해 CSV 데이터를 동시에 비동기로 가져옵니다.
                const promises = sheets.map(sheet => {
                    return new Promise((resolve, reject) => {
                        const csvUrl = `${csvBaseUrl}?gid=${sheet.gid}&single=true&output=csv`;
                        Papa.parse(csvUrl, {
                            download: true,
                            header: true,
                            dynamicTyping: true,
                            skipEmptyLines: true,
                            complete: (results) => resolve(processStockData(results.data, sheet.name)),
                            error: (error) => reject(error)
                        });
                    });
                });

                const results = await Promise.all(promises);
                // 유효한 데이터만 필터링
                globalData = results.filter(data => data && data.prices.length > 0);

                // 3. 드롭다운 필터 및 대시보드 업데이트
                populateDropdown(globalData);
                updateDashboard();

            } catch (error) {
                console.error("데이터 로딩 실패:", error);
                document.getElementById('stockFilter').innerHTML = '<option value="">데이터를 불러오지 못했습니다</option>';
            }
        }

        function processStockData(rawData, name) {
            if (!rawData || rawData.length === 0) return null;
            
            const sortedData = rawData.sort((a, b) => new Date(a.Date) - new Date(b.Date));
            const dates = sortedData.map(d => d.Date);
            const prices = sortedData.map(d => d.Close);
            
            const current = prices[prices.length - 1] || 0;
            const high = Math.max(...prices);
            const low = Math.min(...prices);

            return { name, dates, prices, current, high, low };
        }

        function populateDropdown(dataArray) {
            const select = document.getElementById('stockFilter');
            select.innerHTML = '<option value="all">전체 종목 비교</option>';
            
            dataArray.forEach(stock => {
                const option = document.createElement('option');
                option.value = stock.name;
                option.textContent = stock.name;
                select.appendChild(option);
            });
        }

        function formatCurrency(value) {
            return Math.round(value).toLocaleString('ko-KR') + '원';
        }

        function calculateReturn(prices, daysAgo) {
            if (prices.length < daysAgo) return null;
            const current = prices[prices.length - 1];
            const past = prices[prices.length - daysAgo];
            return (((current - past) / past) * 100).toFixed(2);
        }

        function renderSummaryCards(selectedStocks) {
            const container = document.getElementById('summaryCards');
            container.innerHTML = '';

            selectedStocks.forEach(stock => {
                const cardHtml = `
                    <div class="glass-card summary-box">
                        <h2>${stock.name}</h2>
                        <div class="price-grid">
                            <div class="price-item">
                                <h3>현재가</h3>
                                <p>${formatCurrency(stock.current)}</p>
                            </div>
                            <div class="price-item">
                                <h3>최고가</h3>
                                <p>${formatCurrency(stock.high)}</p>
                            </div>
                            <div class="price-item">
                                <h3>최저가</h3>
                                <p>${formatCurrency(stock.low)}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        function renderReturnsTable(selectedStocks) {
            const tbody = document.getElementById('returnTableBody');
            tbody.innerHTML = '';

            selectedStocks.forEach(stock => {
                // 1달(약 20거래일), 3달(60거래일), 6달(120거래일) 근사치
                const r1m = calculateReturn(stock.prices, 20);
                const r3m = calculateReturn(stock.prices, 60);
                const r6m = calculateReturn(stock.prices, 120);

                const formatRate = (rate) => {
                    if (rate === null) return '-';
                    const num = parseFloat(rate);
                    const cls = num >= 0 ? 'positive' : 'negative';
                    const sign = num > 0 ? '+' : '';
                    return `<span class="${cls}">${sign}${rate}%</span>`;
                };

                const tr = `
                    <tr>
                        <td><strong>${stock.name}</strong></td>
                        <td>${formatRate(r1m)}</td>
                        <td>${formatRate(r3m)}</td>
                        <td>${formatRate(r6m)}</td>
                    </tr>
                `;
                tbody.innerHTML += tr;
            });
        }

        function renderChart(selectedStocks) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            const datasets = selectedStocks.map((stock, index) => {
                const colorMap = colorPalette[index % colorPalette.length];
                return {
                    label: stock.name,
                    data: stock.prices,
                    borderColor: colorMap.border,
                    backgroundColor: colorMap.bg,
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 6,
                    fill: true,
                    tension: 0.3
                };
            });

            // 기준 날짜 설정 (가장 긴 날짜 배열을 가진 종목 기준)
            let commonDates = [];
            if (selectedStocks.length > 0) {
                const longestStock = selectedStocks.reduce((prev, current) => 
                    (prev.dates.length > current.dates.length) ? prev : current
                );
                commonDates = longestStock.dates;
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: commonDates, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#f8f9fa' } },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a0a0b0' } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a0a0b0' } }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        function filterData() {
            updateDashboard();
        }

        function updateDashboard() {
            const filterValue = document.getElementById('stockFilter').value;
            let selectedStocks = [];

            if (filterValue === 'all') {
                selectedStocks = globalData;
            } else {
                const found = globalData.find(d => d.name === filterValue);
                if (found) selectedStocks.push(found);
            }

            renderSummaryCards(selectedStocks);
            renderReturnsTable(selectedStocks);
            renderChart(selectedStocks);
        }

        // 스크립트 실행 시작
        window.onload = loadData;
    </script>
</body>
</html>
