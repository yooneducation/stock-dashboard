<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윤에듀케이션 주식 포트폴리오</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg-navy: #0b132b;
            --text-light: #f8f9fa;
            --gold-primary: #d4af37;
            --gold-secondary: #f3e5ab;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-navy);
            background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(28, 49, 94, 0.5), transparent 40%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--gold-primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .filter-container select {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .filter-container select option {
            background: var(--bg-navy);
            color: var(--text-light);
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Summary Section */
        .summary-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .summary-box h2 {
            font-size: 1.2rem;
            color: var(--gold-secondary);
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 0.5rem;
        }

        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            text-align: center;
        }

        .price-item h3 {
            font-size: 0.85rem;
            color: #a0a0b0;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }

        .price-item p {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
        }

        /* Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            flex: 1;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        /* Table Container */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--card-border);
        }

        th {
            color: var(--gold-primary);
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .positive { color: #00e676; }
        .negative { color: #ff1744; }

        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>윤에듀케이션 주식 포트폴리오</h1>
        <div class="filter-container">
            <select id="stockFilter" onchange="filterData()">
                <option value="all">전체 종목 비교</option>
                <option value="stock1">종목 A (기본 시트)</option>
                <option value="stock2">종목 B (별도 시트)</option>
            </select>
        </div>
    </header>

    <div class="summary-container" id="summaryCards">
        </div>

    <div class="dashboard-grid">
        <div class="glass-card">
            <h3 style="margin-bottom: 1rem; color: var(--gold-secondary);">주가 추이 비교</h3>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
        
        <div class="glass-card table-container">
            <h3 style="margin-bottom: 1rem; color: var(--gold-secondary);">기간별 수익률</h3>
            <table>
                <thead>
                    <tr>
                        <th>구분</th>
                        <th>1개월</th>
                        <th>3개월</th>
                        <th>6개월</th>
                    </tr>
                </thead>
                <tbody id="returnTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <footer>
        © [윤에듀케이션]. All Rights Reserved.
    </footer>

    <script>
        // 첫 번째 시트(종목 A) URL
        const csvUrl1 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBj6JRux8kWW77YrxMFlNojH_oBEqjY7XgEcZkWsuWGgydF4W4BAf2dpMw7IwyWE3d6wZ3mNmiMwAe/pub?output=csv";
        
        // 두 번째 시트(종목 B) URL - 실제 환경에서는 해당 시트의 gid 값을 입력해야 합니다. (예: &gid=123456789)
        // 현재는 데모를 위해 동일한 URL에 임의의 변동성을 주어 시뮬레이션 합니다.
        const csvUrl2 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQBj6JRux8kWW77YrxMFlNojH_oBEqjY7XgEcZkWsuWGgydF4W4BAf2dpMw7IwyWE3d6wZ3mNmiMwAe/pub?output=csv";

        let chartInstance = null;
        let globalData = { stock1: null, stock2: null };

        async function loadData() {
            try {
                const [res1, res2] = await Promise.all([
                    fetchCSV(csvUrl1),
                    fetchCSV(csvUrl2)
                ]);

                // 종목 B의 경우 데모를 위해 가격을 약간 조정 (실제 별도 gid URL 적용 시 제거)
                const adjustedRes2 = res2.map(item => ({
                    Date: item.Date,
                    Close: item.Close * (0.8 + Math.random() * 0.4) 
                }));

                globalData.stock1 = processStockData(res1, '종목 A');
                globalData.stock2 = processStockData(adjustedRes2, '종목 B');

                updateDashboard();
            } catch (error) {
                console.error("데이터 로딩 실패:", error);
            }
        }

        function fetchCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (error) => reject(error)
                });
            });
        }

        function processStockData(rawData, name) {
            const sortedData = rawData.sort((a, b) => new Date(a.Date) - new Date(b.Date));
            const dates = sortedData.map(d => d.Date);
            const prices = sortedData.map(d => d.Close);
            
            const current = prices[prices.length - 1] || 0;
            const high = Math.max(...prices);
            const low = Math.min(...prices);

            return { name, dates, prices, current, high, low };
        }

        function formatCurrency(value) {
            return Math.round(value).toLocaleString('ko-KR') + '원';
        }

        function calculateReturn(prices, daysAgo) {
            if (prices.length < daysAgo) return null;
            const current = prices[prices.length - 1];
            const past = prices[prices.length - daysAgo];
            return (((current - past) / past) * 100).toFixed(2);
        }

        function renderSummaryCards(stock1, stock2, filter) {
            const container = document.getElementById('summaryCards');
            container.innerHTML = '';

            const createCard = (stock) => `
                <div class="glass-card summary-box">
                    <h2>${stock.name}</h2>
                    <div class="price-grid">
                        <div class="price-item">
                            <h3>현재가</h3>
                            <p>${formatCurrency(stock.current)}</p>
                        </div>
                        <div class="price-item">
                            <h3>최고가</h3>
                            <p>${formatCurrency(stock.high)}</p>
                        </div>
                        <div class="price-item">
                            <h3>최저가</h3>
                            <p>${formatCurrency(stock.low)}</p>
                        </div>
                    </div>
                </div>
            `;

            if (filter === 'all' || filter === 'stock1') container.innerHTML += createCard(stock1);
            if (filter === 'all' || filter === 'stock2') container.innerHTML += createCard(stock2);
        }

        function renderReturnsTable(stock1, stock2, filter) {
            const tbody = document.getElementById('returnTableBody');
            tbody.innerHTML = '';

            const createRow = (stock) => {
                // 1달(약 20거래일), 3달(60거래일), 6달(120거래일) 근사치
                const r1m = calculateReturn(stock.prices, 20);
                const r3m = calculateReturn(stock.prices, 60);
                const r6m = calculateReturn(stock.prices, 120);

                const formatRate = (rate) => {
                    if (rate === null) return '-';
                    const num = parseFloat(rate);
                    const cls = num >= 0 ? 'positive' : 'negative';
                    const sign = num > 0 ? '+' : '';
                    return `<span class="${cls}">${sign}${rate}%</span>`;
                };

                return `
                    <tr>
                        <td><strong>${stock.name}</strong></td>
                        <td>${formatRate(r1m)}</td>
                        <td>${formatRate(r3m)}</td>
                        <td>${formatRate(r6m)}</td>
                    </tr>
                `;
            };

            if (filter === 'all' || filter === 'stock1') tbody.innerHTML += createRow(stock1);
            if (filter === 'all' || filter === 'stock2') tbody.innerHTML += createRow(stock2);
        }

        function renderChart(stock1, stock2, filter) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            const datasets = [];
            const commonDates = stock1.dates; // 날짜 기준은 첫번째 시트로 가정

            if (filter === 'all' || filter === 'stock1') {
                datasets.push({
                    label: stock1.name,
                    data: stock1.prices,
                    borderColor: '#d4af37', // 골드
                    backgroundColor: 'rgba(212, 175, 55, 0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    tension: 0.3
                });
            }

            if (filter === 'all' || filter === 'stock2') {
                datasets.push({
                    label: stock2.name,
                    data: stock2.prices,
                    borderColor: '#4facfe', // 대비를 위한 스카이블루/실버톤
                    backgroundColor: 'rgba(79, 172, 254, 0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    tension: 0.3
                });
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: commonDates, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#f8f9fa' } },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a0a0b0' } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a0a0b0' } }
                    }
                }
            });
        }

        function filterData() {
            updateDashboard();
        }

        function updateDashboard() {
            const filter = document.getElementById('stockFilter').value;
            renderSummaryCards(globalData.stock1, globalData.stock2, filter);
            renderReturnsTable(globalData.stock1, globalData.stock2, filter);
            renderChart(globalData.stock1, globalData.stock2, filter);
        }

        window.onload = loadData;
    </script>
</body>
</html>
